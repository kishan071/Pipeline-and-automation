name: Playwright E2E Tests

on:
  push:
    branches:
      - master

jobs:
  playwright-tests:
    name: Run E2E Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          BASE_URL: https://example.com
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Test Results
    if: always()
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Generate JSON report for stats
        continue-on-error: true
        run: |
          echo "Generating JSON report..."
          npx playwright merge-reports --reporter json ./all-blob-reports > results.json
          echo "JSON generation completed, file size: $(wc -c < results.json 2>/dev/null || echo '0') bytes"

      - name: Debug JSON structure
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "JSON file exists, size: $(wc -c < results.json) bytes"
            echo "=== First 1000 chars of JSON ==="
            head -c 1000 results.json || true
            echo ""
            echo "=== Structure check ==="
            jq 'keys' results.json 2>/dev/null || echo "Failed to parse JSON"
            echo "=== Test count attempts ==="
            jq '[.suites[].specs[].tests[]] | length' results.json 2>/dev/null || echo "Method 1 failed"
            jq '.suites | length' results.json 2>/dev/null || echo "Method 2 failed"
          else
            echo "JSON file not found!"
            ls -la results.json 2>/dev/null || echo "File does not exist"
          fi

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          # Extract test statistics from the JSON report
          if [ -f results.json ] && [ -s results.json ]; then
            echo "JSON report found, parsing statistics..."
            
            # Count total unique tests
            TOTAL=$(jq '[.suites[].specs[].tests[]] | length' results.json 2>/dev/null || echo "0")
            
            # Count tests by their final status (last result in results array)
            # Passed: tests where the last result is passed/expected
            PASSED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "passed" or .results[-1].status == "expected")] | length' results.json 2>/dev/null || echo "0")
            
            # Failed: tests where the last result is failed/unexpected/timedOut
            FAILED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "failed" or .results[-1].status == "unexpected" or .results[-1].status == "timedOut")] | length' results.json 2>/dev/null || echo "0")
            
            # Skipped: tests where the last result is skipped
            SKIPPED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "skipped")] | length' results.json 2>/dev/null || echo "0")
            
            echo "Parsed: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
            
            # If parsing returned zeros, try alternative methods
            if [ "$TOTAL" -eq 0 ]; then
              echo "Primary parsing returned 0, trying alternative structure..."
              
              # Try simpler structure - count all tests without nested navigation
              TOTAL=$(jq '.. | objects | select(has("tests")) | .tests | length' results.json 2>/dev/null | awk '{s+=$1} END {print s}' || echo "0")
              
              # Try counting by status at any level
              PASSED=$(jq '.. | objects | select(.status == "passed" or .status == "expected") | .status' results.json 2>/dev/null | wc -l || echo "0")
              FAILED=$(jq '.. | objects | select(.status == "failed" or .status == "unexpected" or .status == "timedOut") | .status' results.json 2>/dev/null | wc -l || echo "0")
              SKIPPED=$(jq '.. | objects | select(.status == "skipped") | .status' results.json 2>/dev/null | wc -l || echo "0")
              
              echo "Alternative parsing: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
            fi
          else
            echo "No valid JSON report found, checking HTML report..."
            TOTAL=0
            PASSED=0
            FAILED=0
            SKIPPED=0
            
            # Fallback: Try to extract from HTML report if it exists
            if [ -f playwright-report/index.html ]; then
              echo "HTML report exists, attempting to extract stats..."
              # This is a simple grep-based extraction - may not be accurate
              PASSED=$(grep -o 'passed' playwright-report/index.html 2>/dev/null | wc -l || echo "0")
              FAILED=$(grep -o 'failed' playwright-report/index.html 2>/dev/null | wc -l || echo "0")
              SKIPPED=$(grep -o 'skipped' playwright-report/index.html 2>/dev/null | wc -l || echo "0")
              TOTAL=$((PASSED + FAILED + SKIPPED))
              echo "HTML parsing: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
            fi
          fi
          
          echo "### 📊 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
