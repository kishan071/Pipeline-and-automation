name: Playwright E2E Tests

on:
  push:
    branches:
      - master

jobs:
  playwright-tests:
    name: Run E2E Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          BASE_URL: https://example.com
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Test Results
    if: always()
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Generate JSON report for stats
        run: npx playwright merge-reports --reporter json ./all-blob-reports > results.json

      - name: Debug JSON structure
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "JSON file exists, size: $(wc -c < results.json) bytes"
            echo "First 500 chars of JSON:"
            head -c 500 results.json || true
          else
            echo "JSON file not found!"
          fi

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          # Extract test statistics from the JSON report
          if [ -f results.json ]; then
            # Debug: Show file exists
            echo "JSON report found, parsing statistics..."
            
            # Count total unique tests
            TOTAL=$(jq '[.suites[].specs[].tests[]] | length' results.json 2>/dev/null || echo "0")
            
            # Count tests by their final status (last result in results array)
            # Passed: tests where the last result is passed/expected
            PASSED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "passed" or .results[-1].status == "expected")] | length' results.json 2>/dev/null || echo "0")
            
            # Failed: tests where the last result is failed/unexpected/timedOut
            FAILED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "failed" or .results[-1].status == "unexpected" or .results[-1].status == "timedOut")] | length' results.json 2>/dev/null || echo "0")
            
            # Skipped: tests where the last result is skipped
            SKIPPED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status == "skipped")] | length' results.json 2>/dev/null || echo "0")
            
            echo "Parsed: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
          else
            echo "No JSON report found"
            TOTAL=0
            PASSED=0
            FAILED=0
            SKIPPED=0
          fi
          
          echo "### 📊 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
