name: Advanced CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Stage 1: Lint and Code Quality (runs in parallel with unit tests)
  lint-and-quality:
    name: 1️⃣ Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Check code formatting with Prettier
        id: prettier
        run: npm run format:check
        continue-on-error: true

      - name: TypeScript type checking
        id: typecheck
        run: npm run type-check
        continue-on-error: true

      - name: Report lint results
        if: always()
        run: |
          echo "📊 Lint & Code Quality Results:"
          echo "ESLint: ${{ steps.eslint.outcome }}"
          echo "Prettier: ${{ steps.prettier.outcome }}"
          echo "TypeScript: ${{ steps.typecheck.outcome }}"
          
          if [ "${{ steps.eslint.outcome }}" != "success" ] || [ "${{ steps.prettier.outcome }}" != "success" ] || [ "${{ steps.typecheck.outcome }}" != "success" ]; then
            echo "⚠️ Some code quality checks failed (advisory only)"
            exit 1
          else
            echo "✅ All code quality checks passed"
          fi

  # Stage 2: Unit Tests (runs in parallel with lint-and-quality)
  unit-tests:
    name: 2️⃣ Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Stage 3: Build Application (depends on unit tests, lint is advisory)
  build:
    name: 3️⃣ Build Application
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always() && needs.unit-tests.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: public/
          retention-days: 7

  # Stage 4: Security Scan (runs in parallel with performance test, advisory only)
  security-scan:
    name: 4️⃣ Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level=high --json > npm-audit.json || true
          
          # Check for high and critical vulnerabilities
          HIGH_VULNS=$(jq -r '.metadata.vulnerabilities.high // 0' npm-audit.json)
          CRITICAL_VULNS=$(jq -r '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          
          echo "High vulnerabilities: $HIGH_VULNS"
          echo "Critical vulnerabilities: $CRITICAL_VULNS"
          
          if [ "$HIGH_VULNS" -gt 0 ] || [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "⚠️ Security vulnerabilities found (advisory only)"
            npm audit --audit-level=high || true
            exit 1
          else
            echo "✅ No high or critical vulnerabilities found"
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('npm-audit.json') != ''
        with:
          name: security-audit-report
          path: npm-audit.json
          retention-days: 30
        continue-on-error: true

      - name: Report security scan results
        if: always()
        run: |
          echo "📊 Security Scan Results:"
          echo "npm audit: ${{ steps.audit.outcome }}"
          if [ "${{ steps.audit.outcome }}" != "success" ]; then
            echo "⚠️ Security vulnerabilities found (advisory only)"
          else
            echo "✅ No security issues found"
          fi

  # Stage 5: Performance Testing (runs in parallel with security scan, advisory only)
  performance-test:
    name: 5️⃣ Performance Test
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        id: lighthouse
        continue-on-error: true
        run: |
          lhci autorun || echo "⚠️ Lighthouse CI failed (advisory only)"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('.lighthouseci/**') != ''
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

      - name: Report performance test results
        if: always()
        run: |
          echo "📊 Performance Test Results:"
          echo "Lighthouse CI: ${{ steps.lighthouse.outcome }}"
          if [ "${{ steps.lighthouse.outcome }}" != "success" ]; then
            echo "⚠️ Performance tests had issues (advisory only)"
          else
            echo "✅ Performance tests passed"
          fi

  # Stage 6: Deploy to GitHub Pages (only on master, depends on build only)
  deploy:
    name: 6️⃣ Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success' && github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    outputs:
      deployment_url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build application
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "🚀 Deployment successful!"
          echo "📄 Site URL: ${{ steps.deployment.outputs.page_url }}"

  # Stage 7: E2E Tests on Deployed Site (runs after deployment)
  e2e-tests:
    name: 7️⃣ E2E Tests on Deployed Site
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for deployment to be fully accessible..."
          sleep 30

      - name: Run Playwright E2E tests on deployed site
        run: npm run test:e2e -- --project=chromium
        env:
          BASE_URL: ${{ needs.deploy.outputs.deployment_url }}
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-deployed
          path: test-results/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-deployed
          path: playwright-report/
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "🎭 E2E Tests completed on deployed site"
          echo "📄 Tested URL: ${{ needs.deploy.outputs.deployment_url }}"
